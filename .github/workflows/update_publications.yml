name: Update Publications from Google Scholar

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install scholarly anthropic python-dotenv

      - name: Fetch new publications from Google Scholar
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd google_scholar_crawler
          python fetch_publications.py

      - name: Check for new files
        id: check_changes
        run: |
          git diff --name-only
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new publications
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _publications/ google_scholar_crawler/results/
          git commit -m "Auto-import new publications from Google Scholar [skip ci]" || echo "No changes to commit"
          git push

name: Update Google Scholar Data

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  fetch-scholar-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install scholarly anthropic python-dotenv pyyaml

      - name: Fetch Scholar data and metrics
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd google_scholar_crawler
          python main.py
          python - <<'EOF'
          import json, yaml, datetime
          with open("results/gs_data.json") as f:
              author = json.load(f)
          metrics = {
              "citations": author["citedby"],
              "h_index": author["hindex"],
              "i10_index": author["i10index"],
              "last_updated": datetime.date.today().isoformat(),
          }
          with open("../_data/scholar_metrics.yml", "w") as f:
              yaml.dump(metrics, f, default_flow_style=False)
          print(metrics)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _publications/ google_scholar_crawler/results/ _data/scholar_metrics.yml
          git commit -m "Update publications and Scholar metrics [skip ci]" || echo "No changes to commit"
          git push

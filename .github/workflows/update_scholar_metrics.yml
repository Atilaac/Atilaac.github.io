name: Update Google Scholar Metrics

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  fetch-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch Scholar metrics
        run: |
          python - <<'EOF'
          from scholarly import scholarly
          import yaml, datetime

          author = scholarly.search_author_id("TTAujLUAAAAJ")
          author = scholarly.fill(author, sections=["basics", "indices"])

          metrics = {
              "citations": author["citedby"],
              "h_index": author["hindex"],
              "i10_index": author["i10index"],
              "last_updated": datetime.date.today().isoformat(),
          }

          with open("_data/scholar_metrics.yml", "w") as f:
              yaml.dump(metrics, f, default_flow_style=False)

          print(metrics)
          EOF

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet _data/scholar_metrics.yml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar_metrics.yml
          git commit -m "Update Google Scholar metrics [skip ci]"
          git push
